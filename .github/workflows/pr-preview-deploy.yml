name: PR Preview Deploy

# SECURITY: This workflow runs in a trusted context with write permissions.
# The build step (pr-preview-build.yml) runs untrusted PR code without secrets.
# This workflow only processes build artifacts and never executes PR-controlled code.

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Build workflow run ID (for artifact download)'
        required: true
      pr-number:
        description: 'PR number to deploy'
        required: true
  workflow_run:
    workflows: ['PR Preview Build']
    types: [completed]
  pull_request_target:
    types: [closed]

concurrency:
  group: pr-preview-deploy
  cancel-in-progress: false

jobs:
  resolve-pr:
    name: Resolve PR Number
    if: >
      github.event_name == 'workflow_dispatch' || (
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-22.04
    permissions:
      actions: read
    outputs:
      pr-number: ${{ steps.pr.outputs.number }}
      run-id: ${{ steps.pr.outputs.run-id }}
    steps:
      - name: Download PR metadata
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@c850b930e6ba138125429b7e5c93fc707a7f8427 # v4
        with:
          name: pr-metadata
          path: ./pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Read PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr-number }}" >> "$GITHUB_OUTPUT"
            echo "run-id=${{ inputs.run-id }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=$(cat ./pr-metadata/pr-number)" >> "$GITHUB_OUTPUT"
            echo "run-id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Preview
    needs: resolve-pr
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - name: Download preview site
        uses: actions/download-artifact@c850b930e6ba138125429b7e5c93fc707a7f8427 # v4
        with:
          name: preview-site
          path: ./preview-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve-pr.outputs.run-id }}
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: gh-pages
          path: gh-pages
      - name: Update PR comment (deploying)
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ needs.resolve-pr.outputs.pr-number }};
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.find(c => c.body.includes('**Preview:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: '**Preview:** Redeploying...'
              });
            }
      - name: Create deployment
        id: deployment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ needs.resolve-pr.outputs.pr-number }};
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              environment: 'pr-preview',
              auto_merge: false,
              required_contexts: [],
              transient_environment: true
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            core.setOutput('id', deployment.id);
            core.setOutput('head-sha', pr.head.sha);
      - name: Deploy to gh-pages
        run: |
          PR_NUMBER=${{ needs.resolve-pr.outputs.pr-number }}
          cd gh-pages
          mkdir -p "pr/${PR_NUMBER}"
          cp -r ../preview-site/* "pr/${PR_NUMBER}/"
          git add "pr/${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet && echo "No changes to deploy" || {
            git commit -m "Deploy PR #${PR_NUMBER} preview"
            git push
          }
      - name: Wait for GitHub Pages
        run: |
          URL="https://eclipse-glsp.github.io/glsp-client/pr/${{ needs.resolve-pr.outputs.pr-number }}/diagram.html"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "$URL"; then
              echo "Page is live"
              exit 0
            fi
            echo "Waiting for GitHub Pages... (attempt $i/30)"
            sleep 10
          done
          echo "::warning::Page did not become available within 5 minutes"
      - name: Update deployment status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ needs.resolve-pr.outputs.pr-number }};
            const previewUrl = `https://eclipse-glsp.github.io/glsp-client/pr/${prNumber}/diagram.html`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'success',
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Comment on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ needs.resolve-pr.outputs.pr-number }};
            const previewUrl = `https://eclipse-glsp.github.io/glsp-client/pr/${prNumber}/diagram.html`;
            const body = [
              `**Preview:** [Open browser example](${previewUrl})`,
              '',
              `Deployed from commit ${{ steps.deployment.outputs.head-sha }}.`
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.find(c => c.body.includes('**Preview:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  cleanup:
    name: Cleanup Preview
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: gh-pages
      - name: Remove preview directory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf "pr/${PR_NUMBER}" || true
          git commit -m "Remove PR #${PR_NUMBER} preview" --allow-empty
          git push
      - name: Update PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.find(c => c.body.includes('**Preview:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: '**Preview:** Removed (PR closed).'
              });
            }
