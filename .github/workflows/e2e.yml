name: 'E2E'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.vscode/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.vscode/**'

jobs:
  playwright:
    name: E2E Tests
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      GLSP_REPO_DIR: '${{ github.workspace }}'
      GLSP_SERVER_PORT: '8081'
      GLSP_WEBSOCKET_PATH: 'workflow'
      GLSP_SERVER_DEBUG: 'true'
      GLSP_SERVER_TYPE: 'node'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: 'glsp-client'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-playwright'
          path: 'glsp-playwright'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-server-node'
          path: 'glsp-server-node'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: glsp-client/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Build components
        run: |
          cd glsp-client
          pnpm glsp repo build
      - name: Run Playwright tests
        id: run_playwright_tests
        run: |
          cd glsp-client
          pnpm glsp repo playwright run test
      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: glsp-playwright/examples/workflow-test/playwright-report/
