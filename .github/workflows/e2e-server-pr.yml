name: 'E2E Server PR'

concurrency:
  group: e2e-server-pr-${{ github.event.inputs.server_pr }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      server_pr:
        description: 'glsp-server-node PR number to test against'
        required: true
        type: string
      client_pr:
        description: 'glsp-client PR number (optional, defaults to master)'
        required: false
        type: string

jobs:
  integration-test:
    name: E2E Server PR
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      STANDALONE_URL: 'file://${{ github.workspace }}/glsp-client/examples/workflow-standalone/app/diagram.html'
      GLSP_SERVER_PORT: '8081'
      GLSP_MCP_SERVER_PORT: '64577'
      GLSP_SERVER_PLAYWRIGHT_MANAGED: 'false'
      GLSP_WEBSOCKET_PATH: 'workflow'
      GLSP_SERVER_DEBUG: 'true'
      GLSP_SERVER_TYPE: 'node'
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve PR branches
        id: resolve
        run: |
          SERVER_REF=$(gh pr view ${{ github.event.inputs.server_pr }} --repo eclipse-glsp/glsp-server-node --json headRefName --jq .headRefName)
          echo "server_ref=$SERVER_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved server PR #${{ github.event.inputs.server_pr }} to branch: $SERVER_REF"

          if [ -n "${{ github.event.inputs.client_pr }}" ]; then
            CLIENT_REF=$(gh pr view ${{ github.event.inputs.client_pr }} --repo eclipse-glsp/glsp-client --json headRefName --jq .headRefName)
            echo "client_ref=$CLIENT_REF" >> "$GITHUB_OUTPUT"
            echo "Resolved client PR #${{ github.event.inputs.client_pr }} to branch: $CLIENT_REF"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.resolve.outputs.client_ref || 'master' }}
          path: 'glsp-client'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-server-node'
          ref: ${{ steps.resolve.outputs.server_ref }}
          path: 'glsp-server-node'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-playwright'
          path: 'glsp-playwright'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Build glsp-client
        run: |
          cd glsp-client
          yarn
          yarn bundle

      - name: Link local protocol into server
        run: |
          cd glsp-client/packages/protocol
          yarn link
          cd ../../../glsp-server-node
          yarn link @eclipse-glsp/protocol

      - name: Build glsp-server-node
        run: |
          cd glsp-server-node
          yarn

      - name: Start GLSP server
        run: |
          cd glsp-server-node
          yarn start:websocket &
          echo "Waiting for GLSP server to be ready on port 8081..."
          timeout 60 bash -c 'until nc -z localhost 8081; do sleep 1; done'
          echo "GLSP server is ready"

      - name: Build glsp-playwright
        run: |
          cd glsp-playwright
          yarn

      - name: Run Playwright tests
        id: run_playwright_tests
        run: |
          cd glsp-playwright
          yarn test:standalone

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-integration
          path: glsp-playwright/examples/workflow-test/playwright-report/
