name: Main Deploy

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - 'examples/**'
  workflow_dispatch:

concurrency:
  group: main-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      deployments: write
    environment:
      name: main
      url: https://eclipse-glsp.github.io/glsp-client/diagram.html
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm
      - name: Build
        run: |
          pnpm compile
          pnpm bundle:browser
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: gh-pages
          path: gh-pages
      - name: Deploy to gh-pages
        working-directory: gh-pages
        run: |
          rsync -a --delete --exclude='.git' --exclude='pr-previews' ../examples/workflow-standalone/app/ ./
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet && echo "No changes to deploy" || {
            git commit -m "Deploy main (${GITHUB_SHA::7})"
            git push
          }
